name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether native/ files changed in this push.
  # Binary builds are skipped when only TS packages changed.
  # publish.sh already handles missing binaries gracefully (skips runtime-*).
  # ---------------------------------------------------------------------------
  changes:
    name: Detect native changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for native changes
        id: filter
        run: |
          BASE_SHA="${{ github.event.before }}"

          # Initial push (null SHA) — build everything
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Initial push — building all binaries"
            exit 0
          fi

          # Diff may fail if BASE_SHA is unreachable (e.g. force push) — default to building
          if ! PUSH_DIFF=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" 2>&1); then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Diff failed (force push?) — building all binaries"
            exit 0
          fi

          if echo "$PUSH_DIFF" | grep -q '^native/'; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Native files changed — building binaries"
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
            echo "No native changes — skipping binary builds"
          fi

  # ---------------------------------------------------------------------------
  # Build native runtime binaries for all supported platforms.
  # Artifacts are downloaded by the release job for npm publishing.
  # Skipped when native/ hasn't changed — publish.sh handles missing binaries.
  # ---------------------------------------------------------------------------
  build-binaries:
    needs: changes
    if: needs.changes.outputs.native == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            pkg: runtime-darwin-arm64
            expected_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-14
            pkg: runtime-darwin-x64
            expected_arch: x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            pkg: runtime-linux-x64
            expected_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            pkg: runtime-linux-arm64
            expected_arch: aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Determine version
        id: version
        run: |
          if [ -f version.txt ]; then
            echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1" >> "$GITHUB_OUTPUT"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          key: v${{ steps.version.outputs.version }}

      - name: Build runtime binary
        working-directory: native
        env:
          VERTZ_VERSION: ${{ steps.version.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to package directory
        run: |
          cp native/target/${{ matrix.target }}/release/vtz packages/${{ matrix.pkg }}/vtz
          chmod +x packages/${{ matrix.pkg }}/vtz

      - name: Verify binary version matches version.txt
        run: |
          EXPECTED="vtz ${{ steps.version.outputs.version }}"
          if [ "$(uname -m)" = "${{ matrix.expected_arch }}" ]; then
            ACTUAL=$(packages/${{ matrix.pkg }}/vtz --version 2>&1)
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Binary version mismatch! Expected '$EXPECTED' but got '$ACTUAL'"
              exit 1
            fi
          else
            echo "Cross-compiled binary, skipping runtime version check"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: packages/${{ matrix.pkg }}/vtz
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Release — builds TS packages, downloads native binaries, publishes all.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: [changes, build-binaries]
    # Run when build-binaries succeeded OR was skipped (no native changes).
    # Do NOT run if build-binaries failed or the workflow was cancelled.
    if: ${{ always() && needs.changes.result == 'success' && needs.build-binaries.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-darwin-arm64
          path: packages/runtime-darwin-arm64/
        continue-on-error: true

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-darwin-x64
          path: packages/runtime-darwin-x64/
        continue-on-error: true

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-x64
          path: packages/runtime-linux-x64/
        continue-on-error: true

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-arm64
          path: packages/runtime-linux-arm64/
        continue-on-error: true

      - name: Make binaries executable
        run: |
          for dir in packages/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              chmod +x "${dir}vtz"
              echo "Binary found: ${dir}vtz"
            fi
          done

      - name: Download runtime from latest release (when not built from source)
        if: ${{ !contains(needs.build-binaries.result, 'success') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "No binary artifacts from this run — downloading from latest GitHub release"
          gh release download --pattern 'vtz-linux-x64' --dir /tmp/vtz-release || {
            echo "::warning::Could not download vtz binary from latest release"
            exit 0
          }
          cp /tmp/vtz-release/vtz-linux-x64 packages/runtime-linux-x64/vtz
          chmod +x packages/runtime-linux-x64/vtz
          echo "Downloaded vtz binary: $(packages/runtime-linux-x64/vtz --version 2>/dev/null || echo 'unknown')"

      - name: Re-link runtime binary
        run: bash scripts/link-runtime.sh

      - name: Build runtime selector package
        working-directory: packages/runtime
        run: bun build index.ts --outdir . --target node

      - name: Build TS packages
        run: turbo run build --filter='!@vertz-examples/*' --filter='!entity-todo-example' --filter='!@vertz/landing-nextjs' --filter='!@vertz/landing-nextjs-vercel' --filter='!@vertz/landing' --filter='!@vertz/component-docs' --filter='!@vertz/site' --filter='!@vertz/og' --filter='!@vertz/mint-docs' --filter='!@vertz-benchmarks/*' --filter='!contacts-api-example' --filter='!create-vertz'

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bash scripts/publish.sh
          version: bash scripts/version.sh
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          LEFTHOOK: '0'

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat version.txt)
          TAG="v${VERSION}"
          ASSETS=()
          for dir in packages/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              pkg=$(basename "$dir")
              platform="${pkg#runtime-}"
              cp "${dir}vtz" "vtz-${platform}"
              ASSETS+=("vtz-${platform}")
            fi
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No binaries found, skipping release"
            exit 0
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG exists, replacing binary assets..."
            for asset in "${ASSETS[@]}"; do
              gh release delete-asset "$TAG" "$asset" --yes 2>/dev/null || true
            done
            gh release upload "$TAG" "${ASSETS[@]}"
            # Mark as latest so install.sh can find binaries via releases/latest
            gh release edit "$TAG" --latest
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest \
              "${ASSETS[@]}"
          fi
