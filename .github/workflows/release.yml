name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether native/ files changed in this push.
  # Binary builds are skipped when only TS packages changed.
  # publish.sh already handles missing binaries gracefully (skips runtime-*).
  # ---------------------------------------------------------------------------
  changes:
    name: Detect native changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for native changes
        id: filter
        run: |
          BASE_SHA="${{ github.event.before }}"

          # Initial push (null SHA) — build everything
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Initial push — building all binaries"
            exit 0
          fi

          # Diff may fail if BASE_SHA is unreachable (e.g. force push) — default to building
          if ! PUSH_DIFF=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" 2>&1); then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Diff failed (force push?) — building all binaries"
            exit 0
          fi

          if echo "$PUSH_DIFF" | grep -q '^native/'; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Native files changed — building binaries"
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
            echo "No native changes — skipping binary builds"
          fi

  # ---------------------------------------------------------------------------
  # Build native runtime binaries for all supported platforms.
  # Artifacts are downloaded by the release job for npm publishing.
  # Skipped when native/ hasn't changed — publish.sh handles missing binaries.
  # ---------------------------------------------------------------------------
  build-binaries:
    needs: changes
    if: needs.changes.outputs.native == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            pkg: runtime-darwin-arm64
            compiler_pkg: native-compiler-darwin-arm64
            expected_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-14
            pkg: runtime-darwin-x64
            compiler_pkg: native-compiler-darwin-x64
            expected_arch: x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            pkg: runtime-linux-x64
            compiler_pkg: native-compiler-linux-x64
            expected_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            pkg: runtime-linux-arm64
            compiler_pkg: native-compiler-linux-arm64
            expected_arch: aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Determine version
        id: version
        run: |
          if [ -f version.txt ]; then
            echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1" >> "$GITHUB_OUTPUT"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          key: v${{ steps.version.outputs.version }}

      - name: Build runtime binary
        working-directory: native
        env:
          VERTZ_VERSION: ${{ steps.version.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to package directory
        run: |
          cp native/target/${{ matrix.target }}/release/vtz packages/${{ matrix.pkg }}/vtz
          chmod +x packages/${{ matrix.pkg }}/vtz

      - name: Ad-hoc code sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - packages/${{ matrix.pkg }}/vtz

      - name: Verify binary version matches version.txt
        run: |
          EXPECTED="vtz ${{ steps.version.outputs.version }}"
          if [ "$(uname -m)" = "${{ matrix.expected_arch }}" ]; then
            ACTUAL=$(packages/${{ matrix.pkg }}/vtz --version 2>&1)
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Binary version mismatch! Expected '$EXPECTED' but got '$ACTUAL'"
              exit 1
            fi
          else
            echo "Cross-compiled binary, skipping runtime version check"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: packages/${{ matrix.pkg }}/vtz
          retention-days: 1

      - name: Build native compiler
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p vertz-compiler

      - name: Copy compiler binary to platform package
        run: |
          COMPILER_PKG="${{ matrix.compiler_pkg }}"
          PLATFORM_SUFFIX="${COMPILER_PKG#native-compiler-}"
          if [[ "${{ matrix.target }}" == *apple* ]]; then
            cp native/target/${{ matrix.target }}/release/libvertz_compiler.dylib \
              "packages/${{ matrix.compiler_pkg }}/vertz-compiler.${PLATFORM_SUFFIX}.node"
          else
            cp native/target/${{ matrix.target }}/release/libvertz_compiler.so \
              "packages/${{ matrix.compiler_pkg }}/vertz-compiler.${PLATFORM_SUFFIX}.node"
          fi

      - name: Verify compiler binary exists
        run: |
          COMPILER_PKG="${{ matrix.compiler_pkg }}"
          PLATFORM_SUFFIX="${COMPILER_PKG#native-compiler-}"
          FILE="packages/${{ matrix.compiler_pkg }}/vertz-compiler.${PLATFORM_SUFFIX}.node"
          if [ ! -f "$FILE" ]; then
            echo "::error::Compiler binary not found: $FILE"
            exit 1
          fi
          echo "Compiler binary: $(ls -la "$FILE")"

      - name: Ad-hoc code sign compiler binary (macOS)
        if: runner.os == 'macOS'
        run: |
          COMPILER_PKG="${{ matrix.compiler_pkg }}"
          PLATFORM_SUFFIX="${COMPILER_PKG#native-compiler-}"
          codesign -s - "packages/${{ matrix.compiler_pkg }}/vertz-compiler.${PLATFORM_SUFFIX}.node"

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.compiler_pkg }}
          path: packages/${{ matrix.compiler_pkg }}/vertz-compiler.*.node
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Release — builds TS packages, downloads native binaries, publishes all.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: [changes, build-binaries]
    # Run when build-binaries succeeded OR was skipped (no native changes).
    # Do NOT run if build-binaries failed or the workflow was cancelled.
    if: ${{ always() && needs.changes.result == 'success' && needs.build-binaries.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve vtz version
        id: resolve-vtz
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          if npm view "@vertz/runtime-linux-x64@${VERSION}" version &>/dev/null; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(npm view @vertz/runtime-linux-x64 dist-tags.latest 2>/dev/null)
            echo "::warning::vtz ${VERSION} not yet published on npm, using ${LATEST}"
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup vtz
        uses: vertz-dev/setup-vtz@v1
        with:
          version: ${{ steps.resolve-vtz.outputs.version }}

      # Bun is still required by `vtzx bun build` for the runtime selector and
      # by package scripts that invoke `bun run`. See ci.yml for context.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: |
          vtz install --frozen
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          # Remove install-time vtz stub so the native binary from setup-vtz is used
          rm -f node_modules/.bin/vtz node_modules/.bin/vertz

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-darwin-arm64
          path: packages/runtime-darwin-arm64/
        continue-on-error: true

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-darwin-x64
          path: packages/runtime-darwin-x64/
        continue-on-error: true

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-x64
          path: packages/runtime-linux-x64/
        continue-on-error: true

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-arm64
          path: packages/runtime-linux-arm64/
        continue-on-error: true

      - name: Make binaries executable
        run: |
          for dir in packages/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              chmod +x "${dir}vtz"
              echo "Binary found: ${dir}vtz"
            fi
          done

      - name: Download native-compiler-darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-compiler-darwin-arm64
          path: packages/native-compiler-darwin-arm64/
        continue-on-error: true

      - name: Download native-compiler-darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: native-compiler-darwin-x64
          path: packages/native-compiler-darwin-x64/
        continue-on-error: true

      - name: Download native-compiler-linux-x64
        uses: actions/download-artifact@v4
        with:
          name: native-compiler-linux-x64
          path: packages/native-compiler-linux-x64/
        continue-on-error: true

      - name: Download native-compiler-linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-compiler-linux-arm64
          path: packages/native-compiler-linux-arm64/
        continue-on-error: true

      - name: Download runtime from latest release (when not built from source)
        if: ${{ !contains(needs.build-binaries.result, 'success') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "No binary artifacts from this run — downloading from latest v* GitHub release"
          # Find the latest v* release (changeset creates per-package releases that
          # take over "Latest", so we can't rely on the default)
          VTZ_TAG=$(gh release list --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("v0."))][0].tagName')
          if [ -z "$VTZ_TAG" ]; then
            echo "::warning::Could not find a v* release with runtime binaries"
            exit 0
          fi
          echo "Found release: $VTZ_TAG"
          gh release download "$VTZ_TAG" --pattern 'vtz-linux-x64' --dir /tmp/vtz-release || {
            echo "::warning::Could not download vtz binary from release $VTZ_TAG"
            exit 0
          }
          cp /tmp/vtz-release/vtz-linux-x64 packages/runtime-linux-x64/vtz
          chmod +x packages/runtime-linux-x64/vtz
          echo "Downloaded vtz binary: $(packages/runtime-linux-x64/vtz --version 2>/dev/null || echo 'unknown')"

      - name: Re-link runtime binary
        run: bash scripts/link-runtime.sh

      - name: Build runtime selector package
        working-directory: packages/runtime
        run: vtzx bun build index.ts --outdir . --target node

      - name: Prepare compiler binary for library builds
        id: compiler
        run: |
          # Use the linux-x64 compiler artifact for library builds on the release runner
          if [ -f packages/native-compiler-linux-x64/vertz-compiler.linux-x64.node ]; then
            cp packages/native-compiler-linux-x64/vertz-compiler.linux-x64.node \
              native/vertz-compiler/vertz-compiler.linux-x64.node
            echo "Native compiler binary ready (from artifact)"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No compiler artifact — will build from source"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust (for native compiler)
        if: steps.compiler.outputs.needs_build == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        if: steps.compiler.outputs.needs_build == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          key: compiler-only

      - name: Build native compiler for library builds (fallback)
        if: steps.compiler.outputs.needs_build == 'true'
        run: |
          cargo build --release --manifest-path native/Cargo.toml -p vertz-compiler
          cp native/target/release/libvertz_compiler.so native/vertz-compiler/vertz-compiler.linux-x64.node
          echo "Native compiler binary ready (built from source)"

      - name: Build @vertz/build
        run: |
          cd packages/build && tsc --outDir dist --declaration
          cd $GITHUB_WORKSPACE
          ln -sf ../../packages/build/dist/cli.js node_modules/.bin/vertz-build
          chmod +x node_modules/.bin/vertz-build

      - name: Build TS packages
        run: turbo run build --filter='!@vertz-examples/*' --filter='!entity-todo-example' --filter='!@vertz/landing-nextjs' --filter='!@vertz/landing-nextjs-vercel' --filter='!@vertz/landing' --filter='!@vertz/component-docs' --filter='!@vertz/site' --filter='!@vertz/og' --filter='!@vertz/mint-docs' --filter='!@vertz-benchmarks/*' --filter='!contacts-api-example' --filter='!create-vertz'

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bash scripts/publish.sh
          version: bash scripts/version.sh
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          LEFTHOOK: '0'

      # Only touch GitHub releases when this run actually published packages
      # to npm. On non-publishing runs (e.g. an unrelated commit lands on main
      # while a "Version Packages" PR is still open), `scripts/version.sh`
      # still bumps `version.txt` locally via changesets/action, which used to
      # trip this step into creating a premature `v${VERSION}` release with
      # only the fallback `vtz-linux-x64` binary — and marking it "latest".
      # That is #2860 bug 1.
      - name: Upload binaries to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          VERSION=$(cat version.txt)
          TAG="v${VERSION}"
          ASSETS=()
          for dir in packages/runtime-*/; do
            if [ -f "${dir}vtz" ]; then
              pkg=$(basename "$dir")
              platform="${pkg#runtime-}"
              cp "${dir}vtz" "vtz-${platform}"
              ASSETS+=("vtz-${platform}")
            fi
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No binaries found, skipping release"
            exit 0
          fi

          # Decide whether we should claim the "latest" pointer. If a newer
          # v-prefixed semver release already holds it (e.g. a parallel
          # release run for a later version finished first), refuse to
          # regress the pointer. That is #2860 bug 2.
          CURRENT_LATEST=$(gh api "repos/$REPO/releases/latest" --jq .tag_name 2>/dev/null || echo "")
          MAKE_LATEST="true"
          if [[ "$CURRENT_LATEST" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] && [ "$CURRENT_LATEST" != "$TAG" ]; then
            TAG_VER="${TAG#v}"
            LATEST_VER="${CURRENT_LATEST#v}"
            HIGHEST=$(printf '%s\n%s\n' "$LATEST_VER" "$TAG_VER" | sort -V | tail -1)
            if [ "$HIGHEST" != "$TAG_VER" ]; then
              echo "::notice::A newer release ($CURRENT_LATEST) already holds 'latest' — not regressing to $TAG."
              MAKE_LATEST="false"
            fi
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG exists, replacing binary assets..."
            for asset in "${ASSETS[@]}"; do
              gh release delete-asset "$TAG" "$asset" --yes 2>/dev/null || true
            done
            gh release upload "$TAG" "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

          # `gh release create` defaults `make_latest` to true, so we must
          # explicitly PATCH it either way to honor the semver guard above.
          RELEASE_ID=$(gh api "repos/$REPO/releases/tags/$TAG" --jq .id)
          gh api --method PATCH "repos/$REPO/releases/$RELEASE_ID" \
            -f "make_latest=$MAKE_LATEST" > /dev/null
          if [ "$MAKE_LATEST" = "true" ]; then
            echo "Marked $TAG as latest."
          fi
