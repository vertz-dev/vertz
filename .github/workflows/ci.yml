name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - 'feat/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether source files changed.
  #
  # For push-to-main events we always run the full TS pipeline.
  # Native (Rust) jobs only run if files under native/ actually changed.
  # For pull requests we compare the PR diff against source patterns.
  # If only non-source files changed (docs, plans, .claude rules, etc.) or
  # only docs-only packages changed (mint-docs, site, og, landing), the
  # heavy jobs below are skipped.
  #
  # IMPORTANT: When a job is skipped via `if:`, GitHub reports its status as
  # "Success", so required status checks are still satisfied and the PR remains
  # mergeable.  This is NOT the same as skipping the entire workflow with
  # `paths-ignore`, which would leave the check in "Pending" and block merges.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      native: ${{ steps.filter.outputs.native }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for source changes
        id: filter
        run: |
          # Push to main: always run TS pipeline, only run native if native/ changed
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"

            BASE_SHA="${{ github.event.before }}"

            # Initial push (null SHA) — run everything
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              echo "native=true" >> "$GITHUB_OUTPUT"
              echo "db=true" >> "$GITHUB_OUTPUT"
              echo "push (initial) — running full pipeline"
              exit 0
            fi

            # Diff may fail if BASE_SHA is unreachable (e.g. force push) — default to running everything
            if ! PUSH_DIFF=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" 2>&1); then
              echo "native=true" >> "$GITHUB_OUTPUT"
              echo "db=true" >> "$GITHUB_OUTPUT"
              echo "push — diff failed (force push?), running full pipeline"
              exit 0
            fi

            if echo "$PUSH_DIFF" | grep -q '^native/'; then
              echo "native=true" >> "$GITHUB_OUTPUT"
              echo "push — native files changed"
            else
              echo "native=false" >> "$GITHUB_OUTPUT"
              echo "push — no native changes, skipping native pipeline"
            fi

            if echo "$PUSH_DIFF" | grep -q '^packages/db/'; then
              echo "db=true" >> "$GITHUB_OUTPUT"
              echo "push — db package changed"
            else
              echo "db=false" >> "$GITHUB_OUTPUT"
              echo "push — no db changes, skipping db tests"
            fi

            exit 0
          fi

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [ -z "$CHANGED" ]; then
            echo "src=false" >> "$GITHUB_OUTPUT"
            echo "native=false" >> "$GITHUB_OUTPUT"
            echo "db=false" >> "$GITHUB_OUTPUT"
            echo "No files changed"
            exit 0
          fi

          # Config files that ALWAYS trigger full CI
          CONFIG_PATTERNS=(
            ".oxlintrc.json"
            ".oxfmtrc.json"
            "tsconfig.json"
            "package.json"
            "bun.lock"
            "vertz.lock"
            "turbo.json"
            "ci.config.ts"
            "lefthook.yml"
            "oxlint-plugins/"
          )

          # Source directories that trigger full CI
          SOURCE_DIRS=(
            "examples/task-manager/"
          )

          # Package prefixes that are docs/site-only — changes limited to these
          # do NOT trigger the heavy build-test pipeline.
          # NOTE: packages/docs/ is NOT here because @vertz/cli depends on it.
          DOCS_ONLY_PKGS=(
            "packages/mint-docs/"
            "packages/site/"
            "packages/og/"
            "packages/landing/"
          )

          HAS_CONFIG=false
          HAS_SOURCE_DIR=false
          HAS_CORE_PKG=false
          HAS_NATIVE=false
          HAS_DB=false

          while IFS= read -r file; do
            # Check config patterns
            for pattern in "${CONFIG_PATTERNS[@]}"; do
              if [[ "$file" == "$pattern"* ]] || [[ "$file" == "${pattern%/}" ]]; then
                HAS_CONFIG=true
                echo "Config file changed: $file (matched $pattern)"
                break
              fi
            done

            # Check source directories
            for pattern in "${SOURCE_DIRS[@]}"; do
              if [[ "$file" == "$pattern"* ]]; then
                HAS_SOURCE_DIR=true
                echo "Source dir changed: $file (matched $pattern)"
                break
              fi
            done

            # Check if file is in native/ (Rust workspace)
            if [[ "$file" == native/* ]]; then
              HAS_NATIVE=true
              echo "Native changed: $file"
            fi

            # Check if file is in packages/db/
            if [[ "$file" == packages/db/* ]]; then
              HAS_DB=true
              echo "DB package changed: $file"
            fi

            # Check if file is in packages/ but NOT a docs-only package
            if [[ "$file" == packages/* ]]; then
              IS_DOCS_ONLY=false
              for docs_prefix in "${DOCS_ONLY_PKGS[@]}"; do
                if [[ "$file" == "$docs_prefix"* ]]; then
                  IS_DOCS_ONLY=true
                  break
                fi
              done
              if [ "$IS_DOCS_ONLY" = "false" ]; then
                HAS_CORE_PKG=true
                echo "Core package changed: $file"
              fi
            fi
          done <<< "$CHANGED"

          if [ "$HAS_CONFIG" = "true" ] || [ "$HAS_SOURCE_DIR" = "true" ] || [ "$HAS_CORE_PKG" = "true" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$HAS_NATIVE" = "true" ]; then
            echo "native=true" >> "$GITHUB_OUTPUT"
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$HAS_DB" = "true" ]; then
            echo "db=true" >> "$GITHUB_OUTPUT"
          else
            echo "db=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$HAS_CONFIG" != "true" ] && [ "$HAS_SOURCE_DIR" != "true" ] && [ "$HAS_CORE_PKG" != "true" ] && [ "$HAS_NATIVE" != "true" ]; then
            echo ""
            echo "No source changes detected — heavy CI jobs will be skipped."
            echo "Changed files (docs/config only):"
            echo "$CHANGED" | sed 's/^/  /'
          fi

  # ---------------------------------------------------------------------------
  # Lint & format — runs in parallel with build-test.
  # Uses oxlint/oxfmt directly (not turbo) because only 1 of ~26 packages has
  # a lint script — the other 25 are turbo no-ops.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Resolve vtz version
        id: resolve-vtz
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          # Check if the npm package exists; setup-vtz tolerates binary
          # version mismatches (warns instead of failing) when a release
          # bumped package.json but didn't rebuild the native binary.
          if npm view "@vertz/runtime-linux-x64@${VERSION}" version &>/dev/null; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(npm view @vertz/runtime-linux-x64 dist-tags.latest 2>/dev/null)
            echo "::warning::vtz ${VERSION} not yet published on npm, using ${LATEST}"
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup vtz
        uses: vertz-dev/setup-vtz@v1
        with:
          version: ${{ steps.resolve-vtz.outputs.version }}

      # TODO: Switch to `vtz install --frozen` once the next vtz release
      # ships with the scoped-bin-stub fix (native/vtz/src/pm/bin.rs).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          # Remove fallback vtz shell script so the native binary from setup-vtz is used
          rm -f node_modules/.bin/vtz node_modules/.bin/vertz

      - name: Lint
        run: oxlint packages/

      - name: Format check
        run: oxfmt --check packages/

  # ---------------------------------------------------------------------------
  # Build, typecheck & test — the heavy job.
  # Runs turbo without lint (handled by the parallel lint job above).
  # ---------------------------------------------------------------------------
  build-test:
    name: Build, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve vtz version
        id: resolve-vtz
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          if npm view "@vertz/runtime-linux-x64@${VERSION}" version &>/dev/null; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(npm view @vertz/runtime-linux-x64 dist-tags.latest 2>/dev/null)
            echo "::warning::vtz ${VERSION} not yet published on npm, using ${LATEST}"
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup vtz
        uses: vertz-dev/setup-vtz@v1
        with:
          version: ${{ steps.resolve-vtz.outputs.version }}

      # TODO: Switch to `vtz install --frozen` once the next vtz release
      # ships with the scoped-bin-stub fix (native/vtz/src/pm/bin.rs).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          # Remove fallback vtz shell script so the native binary from setup-vtz is used
          rm -f node_modules/.bin/vtz node_modules/.bin/vertz

      - name: Build @vertz/build
        run: |
          cd packages/build && tsc --outDir dist --declaration
          cd $GITHUB_WORKSPACE
          ln -sf ../../packages/build/dist/cli.js node_modules/.bin/vertz-build
          chmod +x node_modules/.bin/vertz-build

      - name: Build @vertz/ci
        run: cd packages/ci && vtz run build

      - name: Build & typecheck
        run: vtz ci build-typecheck --concurrency 2

      - name: Test
        run: vtz ci test --concurrency 2

  # ---------------------------------------------------------------------------
  # Rust checks — runs in parallel with TS jobs.
  # Validates the native/ Cargo workspace: formatting, clippy, tests.
  # ---------------------------------------------------------------------------
  rust-checks:
    name: Rust Checks
    runs-on: macos-14
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.native == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Check formatting
        working-directory: native
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: native
        run: cargo clippy --all-targets --release -- -D warnings

      - name: Run tests
        working-directory: native
        run: cargo test --all

  # ---------------------------------------------------------------------------
  # NAPI compiler build & test — validates the Rust→JS compiler bridge.
  # ---------------------------------------------------------------------------
  napi-build:
    name: NAPI Compiler Build & Test
    runs-on: macos-14
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.native == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      # NAPI tests use bun test because the vtz runtime doesn't support
      # require()/createRequire() for loading .node (NAPI) binaries.
      # TODO: Switch to vtz test once the runtime supports NAPI loading.
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native compiler
        working-directory: native
        run: cargo build --release -p vertz-compiler

      - name: Copy dylib to .node
        run: cp native/target/release/libvertz_compiler.dylib native/vertz-compiler/vertz-compiler.darwin-arm64.node

      - name: Run NAPI binding tests
        working-directory: native/vertz-compiler
        run: bun test __tests__/*.test.ts
