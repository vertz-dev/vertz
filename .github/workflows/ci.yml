name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - 'feat/**'
  # Allow the auto-rebase workflow to re-trigger CI on rebased branches.
  # Pushes made with GITHUB_TOKEN do not fire pull_request events, so the
  # auto-rebase workflow dispatches this workflow explicitly after each
  # successful rebase+push.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether source files changed.
  #
  # For push-to-main events we always run the full TS pipeline.
  # Native (Rust) jobs only run if files under native/ actually changed.
  # For workflow_dispatch events (triggered by auto-rebase) we run the
  # full pipeline since there is no PR diff context available.
  # For pull requests we compare the PR diff against source patterns.
  # If only non-source files changed (docs, plans, .claude rules, etc.) or
  # only docs-only packages changed (mint-docs, site, og, landing), the
  # heavy jobs below are skipped.
  #
  # IMPORTANT: When a job is skipped via `if:`, GitHub reports its status as
  # "Success", so required status checks are still satisfied and the PR remains
  # mergeable.  This is NOT the same as skipping the entire workflow with
  # `paths-ignore`, which would leave the check in "Pending" and block merges.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for source changes
        id: filter
        run: |
          # workflow_dispatch (auto-rebase) always runs everything — no diff context
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — running full pipeline"
            exit 0
          fi

          # Push to main: always run TS pipeline, only run native if native/ changed
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"

            BASE_SHA="${{ github.event.before }}"

            # Initial push (null SHA) — run everything
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              echo "native=true" >> "$GITHUB_OUTPUT"
              echo "push (initial) — running full pipeline"
              exit 0
            fi

            # Diff may fail if BASE_SHA is unreachable (e.g. force push) — default to running native
            if ! PUSH_DIFF=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" 2>&1); then
              echo "native=true" >> "$GITHUB_OUTPUT"
              echo "push — diff failed (force push?), running native pipeline"
              exit 0
            fi

            if echo "$PUSH_DIFF" | grep -q '^native/'; then
              echo "native=true" >> "$GITHUB_OUTPUT"
              echo "push — native files changed"
            else
              echo "native=false" >> "$GITHUB_OUTPUT"
              echo "push — no native changes, skipping native pipeline"
            fi

            exit 0
          fi

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [ -z "$CHANGED" ]; then
            echo "src=false" >> "$GITHUB_OUTPUT"
            echo "native=false" >> "$GITHUB_OUTPUT"
            echo "No files changed"
            exit 0
          fi

          # Config files that ALWAYS trigger full CI
          CONFIG_PATTERNS=(
            ".oxlintrc.json"
            ".oxfmtrc.json"
            "tsconfig.json"
            "package.json"
            "bun.lock"
            "turbo.json"
            "lefthook.yml"
            "oxlint-plugins/"
          )

          # Source directories that trigger full CI
          SOURCE_DIRS=(
            "examples/task-manager/"
          )

          # Package prefixes that are docs/site-only — changes limited to these
          # do NOT trigger the heavy build-test pipeline.
          # NOTE: packages/docs/ is NOT here because @vertz/cli depends on it.
          DOCS_ONLY_PKGS=(
            "packages/mint-docs/"
            "packages/site/"
            "packages/og/"
            "packages/landing/"
          )

          HAS_CONFIG=false
          HAS_SOURCE_DIR=false
          HAS_CORE_PKG=false
          HAS_NATIVE=false

          while IFS= read -r file; do
            # Check config patterns
            for pattern in "${CONFIG_PATTERNS[@]}"; do
              if [[ "$file" == "$pattern"* ]] || [[ "$file" == "${pattern%/}" ]]; then
                HAS_CONFIG=true
                echo "Config file changed: $file (matched $pattern)"
                break
              fi
            done

            # Check source directories
            for pattern in "${SOURCE_DIRS[@]}"; do
              if [[ "$file" == "$pattern"* ]]; then
                HAS_SOURCE_DIR=true
                echo "Source dir changed: $file (matched $pattern)"
                break
              fi
            done

            # Check if file is in native/ (Rust workspace)
            if [[ "$file" == native/* ]]; then
              HAS_NATIVE=true
              echo "Native changed: $file"
            fi

            # Check if file is in packages/ but NOT a docs-only package
            if [[ "$file" == packages/* ]]; then
              IS_DOCS_ONLY=false
              for docs_prefix in "${DOCS_ONLY_PKGS[@]}"; do
                if [[ "$file" == "$docs_prefix"* ]]; then
                  IS_DOCS_ONLY=true
                  break
                fi
              done
              if [ "$IS_DOCS_ONLY" = "false" ]; then
                HAS_CORE_PKG=true
                echo "Core package changed: $file"
              fi
            fi
          done <<< "$CHANGED"

          if [ "$HAS_CONFIG" = "true" ] || [ "$HAS_SOURCE_DIR" = "true" ] || [ "$HAS_CORE_PKG" = "true" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$HAS_NATIVE" = "true" ]; then
            echo "native=true" >> "$GITHUB_OUTPUT"
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$HAS_CONFIG" != "true" ] && [ "$HAS_SOURCE_DIR" != "true" ] && [ "$HAS_CORE_PKG" != "true" ] && [ "$HAS_NATIVE" != "true" ]; then
            echo ""
            echo "No source changes detected — heavy CI jobs will be skipped."
            echo "Changed files (docs/config only):"
            echo "$CHANGED" | sed 's/^/  /'
          fi

  # ---------------------------------------------------------------------------
  # Lint & format — runs in parallel with build-test.
  # Uses oxlint/oxfmt directly (not turbo) because only 1 of ~26 packages has
  # a lint script — the other 25 are turbo no-ops.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Lint
        run: oxlint packages/

      - name: Format check
        run: oxfmt --check packages/

  # ---------------------------------------------------------------------------
  # Build, typecheck & test — the heavy job.
  # Runs turbo without lint (handled by the parallel lint job above).
  # ---------------------------------------------------------------------------
  build-test:
    name: Build, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Build & typecheck
        env:
          TURBO_CONCURRENCY: 2
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            bun run ci:build-typecheck
          else
            bun run ci:build-typecheck:affected
          fi

      - name: Test
        env:
          TURBO_CONCURRENCY: 2
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            bun run ci:test
          else
            bun run ci:test:affected
          fi

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, build-test]
    if: needs.changes.outputs.src == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vertz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changes
        run: |
          # On push to main or workflow_dispatch, mark all packages as changed so we get full coverage
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
              echo "${pkg//-/_}=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA)

          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if echo "$CHANGED_FILES" | grep -q "^packages/$pkg/"; then
              echo "${pkg//-/_}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${pkg//-/_}=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Build packages
        env:
          TURBO_CONCURRENCY: 2
        run: turbo run build --filter='!@vertz-examples/*' --filter='!entity-todo-example' --filter='!@vertz/landing-nextjs' --filter='!@vertz/landing-nextjs-vercel' --filter='!@vertz/landing' --filter='!@vertz/component-docs' --filter='!@vertz/site' --filter='!@vertz/og' --filter='!@vertz/mint-docs' --filter='!@vertz-benchmarks/*' --filter='!contacts-api-example' --filter='!create-vertz'

      - name: Run tests with coverage
        env:
          DATABASE_TEST_URL: postgres://postgres:postgres@localhost:5432/vertz_test
        run: |
          run_coverage() {
            local pkg=$1
            echo "::group::Coverage — $pkg"
            cd packages/$pkg

            # Detect test runner from package.json "test" script
            TEST_SCRIPT=$(node -e "console.log(require('./package.json').scripts?.test ?? '')")

            if echo "$TEST_SCRIPT" | grep -q "bun test"; then
              bun test --coverage || true
            else
              vitest run \
                --coverage \
                --coverage.reporter=json-summary \
                --coverage.reporter=json \
                --coverage.reporter=text \
                --coverage.reportOnFailure || true
            fi

            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          }

          # On push to main or workflow_dispatch, run coverage for all packages
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
              run_coverage "$pkg"
            done
            exit 0
          fi

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA)

          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if echo "$CHANGED_FILES" | grep -q "^packages/$pkg/"; then
              run_coverage "$pkg"
            else
              echo "Skipping coverage for $pkg (no changes)"
            fi
          done

      - name: Verify coverage output
        run: |
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "OK: packages/$pkg/coverage/lcov.info (bun test)"
            elif [ -f "packages/$pkg/coverage/coverage-summary.json" ]; then
              echo "OK: packages/$pkg/coverage/coverage-summary.json (vitest)"
            else
              echo "MISSING: packages/$pkg — no coverage output found"
            fi
          done

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Download and verify the Codecov CLI
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov

          # Create commit and report in Codecov
          ./codecov create-commit -t "$CODECOV_TOKEN" --git-service github
          ./codecov create-report -t "$CODECOV_TOKEN" --git-service github

          # Upload each package's coverage with its own flag
          # bun test produces lcov.info (relative paths), vitest produces coverage-final.json (absolute paths)
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "Uploading coverage for $pkg (lcov)"
              # bun test emits relative SF: paths (e.g. "src/foo.ts").
              # Codecov flags match against repo-root-relative paths (e.g. "packages/pkg/src/foo.ts").
              # Rewrite SF: lines to include the package prefix so flag matching works.
              sed -i "s|^SF:src/|SF:packages/$pkg/src/|" "packages/$pkg/coverage/lcov.info"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/lcov.info" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            elif [ -f "packages/$pkg/coverage/coverage-final.json" ]; then
              echo "Uploading coverage for $pkg (json)"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/coverage-final.json" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            else
              echo "Skipping $pkg (no coverage file)"
            fi
          done

          # Signal that all uploads are complete — triggers report processing
          ./codecov send-notifications -t "$CODECOV_TOKEN" --git-service github

  # ---------------------------------------------------------------------------
  # Rust checks — runs in parallel with TS jobs.
  # Validates the native/ Cargo workspace: formatting, clippy, tests.
  # ---------------------------------------------------------------------------
  rust-checks:
    name: Rust Checks
    runs-on: macos-14
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.native == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Check formatting
        working-directory: native
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: native
        run: cargo clippy --all-targets --release -- -D warnings

      - name: Run tests
        working-directory: native
        run: cargo test --all

  # ---------------------------------------------------------------------------
  # NAPI compiler build & test — validates the Rust→JS compiler bridge.
  # ---------------------------------------------------------------------------
  napi-build:
    name: NAPI Compiler Build & Test
    runs-on: macos-14
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.native == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - uses: oven-sh/setup-bun@v2

      - name: Build native compiler
        working-directory: native
        run: cargo build --release -p vertz-compiler

      - name: Copy dylib to .node
        run: cp native/target/release/libvertz_compiler.dylib native/vertz-compiler/vertz-compiler.darwin-arm64.node

      - name: Run NAPI binding tests
        working-directory: native/vertz-compiler
        run: bun test __tests__/*.test.ts
