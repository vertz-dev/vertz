name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - 'feat/**'
  # Allow the auto-rebase workflow to re-trigger CI on rebased branches.
  # Pushes made with GITHUB_TOKEN do not fire pull_request events, so the
  # auto-rebase workflow dispatches this workflow explicitly after each
  # successful rebase+push.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether source files changed.
  #
  # For push-to-main events we always run the full pipeline.
  # For workflow_dispatch events (triggered by auto-rebase) we also always
  # run the full pipeline since there is no PR diff context available.
  # For pull requests we compare the PR diff against source patterns.
  # If only non-source files changed (docs, plans, .claude rules, etc.) or
  # only docs-only packages changed (mint-docs, site, og, landing), the
  # heavy jobs below are skipped.
  #
  # IMPORTANT: When a job is skipped via `if:`, GitHub reports its status as
  # "Success", so required status checks are still satisfied and the PR remains
  # mergeable.  This is NOT the same as skipping the entire workflow with
  # `paths-ignore`, which would leave the check in "Pending" and block merges.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for source changes
        id: filter
        run: |
          # Pushes to main and workflow_dispatch (auto-rebase) always run the full pipeline
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"
            echo "${{ github.event_name }} — running full pipeline"
            exit 0
          fi

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [ -z "$CHANGED" ]; then
            echo "src=false" >> "$GITHUB_OUTPUT"
            echo "No files changed"
            exit 0
          fi

          # Config files that ALWAYS trigger full CI
          CONFIG_PATTERNS=(
            ".oxlintrc.json"
            ".oxfmtrc.json"
            "tsconfig.json"
            "package.json"
            "bun.lock"
            "turbo.json"
            "lefthook.yml"
            "oxlint-plugins/"
          )

          # Source directories that trigger full CI
          SOURCE_DIRS=(
            "examples/task-manager/"
          )

          # Package prefixes that are docs/site-only — changes limited to these
          # do NOT trigger the heavy build-test pipeline.
          # NOTE: packages/docs/ is NOT here because @vertz/cli depends on it.
          DOCS_ONLY_PKGS=(
            "packages/mint-docs/"
            "packages/site/"
            "packages/og/"
            "packages/landing/"
          )

          HAS_CONFIG=false
          HAS_SOURCE_DIR=false
          HAS_CORE_PKG=false

          while IFS= read -r file; do
            # Check config patterns
            for pattern in "${CONFIG_PATTERNS[@]}"; do
              if [[ "$file" == "$pattern"* ]] || [[ "$file" == "${pattern%/}" ]]; then
                HAS_CONFIG=true
                echo "Config file changed: $file (matched $pattern)"
                break
              fi
            done

            # Check source directories
            for pattern in "${SOURCE_DIRS[@]}"; do
              if [[ "$file" == "$pattern"* ]]; then
                HAS_SOURCE_DIR=true
                echo "Source dir changed: $file (matched $pattern)"
                break
              fi
            done

            # Check if file is in packages/ but NOT a docs-only package
            if [[ "$file" == packages/* ]]; then
              IS_DOCS_ONLY=false
              for docs_prefix in "${DOCS_ONLY_PKGS[@]}"; do
                if [[ "$file" == "$docs_prefix"* ]]; then
                  IS_DOCS_ONLY=true
                  break
                fi
              done
              if [ "$IS_DOCS_ONLY" = "false" ]; then
                HAS_CORE_PKG=true
                echo "Core package changed: $file"
              fi
            fi
          done <<< "$CHANGED"

          if [ "$HAS_CONFIG" = "true" ] || [ "$HAS_SOURCE_DIR" = "true" ] || [ "$HAS_CORE_PKG" = "true" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "No core source changes detected — heavy CI jobs will be skipped."
            echo "Changed files (docs/config only):"
            echo "$CHANGED" | sed 's/^/  /'
          fi

  # ---------------------------------------------------------------------------
  # Lint & format — runs in parallel with build-test.
  # Uses oxlint/oxfmt directly (not turbo) because only 1 of ~26 packages has
  # a lint script — the other 25 are turbo no-ops.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx oxlint packages/

      - name: Format check
        run: bunx oxfmt --check packages/

  # ---------------------------------------------------------------------------
  # Build, typecheck & test — the heavy job.
  # Runs turbo without lint (handled by the parallel lint job above).
  # ---------------------------------------------------------------------------
  build-test:
    name: Build, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & typecheck
        env:
          TURBO_CONCURRENCY: 2
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            bun run ci:build-typecheck
          else
            bun run ci:build-typecheck:affected
          fi

      - name: Test
        env:
          TURBO_CONCURRENCY: 2
        run: |
          # Bun test processes on Linux may not exit after all tests pass
          # (open handles keep the event loop alive). We use timeout with
          # --kill-after to ensure cleanup, and check the output for actual
          # test failures vs. just a hanging process.
          set +eo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            timeout --kill-after=10 540 bun run ci:test 2>&1 | tee /tmp/test-output.log
          else
            timeout --kill-after=10 540 bun run ci:test:affected 2>&1 | tee /tmp/test-output.log
          fi
          EXIT_CODE=${PIPESTATUS[0]}
          set -eo pipefail

          if [ $EXIT_CODE -eq 0 ]; then
            exit 0
          fi

          # Check if any bun test reported actual failures (N fail where N > 0)
          FAIL_LINES=$(grep -cE '^\s*[1-9][0-9]*\s+fail' /tmp/test-output.log || true)
          if [ "$FAIL_LINES" -gt 0 ]; then
            echo "::error::Tests failed"
            exit 1
          fi

          # Exit 124 = SIGTERM timeout, 137 = SIGKILL timeout
          if [ $EXIT_CODE -eq 124 ] || [ $EXIT_CODE -eq 137 ]; then
            echo "::warning::Test processes did not exit cleanly (likely open handles in bun) but no test failures detected"
            exit 0
          fi

          echo "::error::Test step failed with exit code $EXIT_CODE"
          exit 1

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build-test]
    if: needs.changes.outputs.src == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vertz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changes
        run: |
          # On push to main or workflow_dispatch, mark all packages as changed so we get full coverage
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-compiler ui-primitives ui-server; do
              echo "${pkg//-/_}=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA)

          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-compiler ui-primitives ui-server; do
            if echo "$CHANGED_FILES" | grep -q "^packages/$pkg/"; then
              echo "${pkg//-/_}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${pkg//-/_}=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bunx turbo run build --filter='!@vertz-examples/*' --filter='!entity-todo-example' --filter='!@vertz/landing-nextjs' --filter='!@vertz/landing-nextjs-vercel' --filter='!@vertz/native-compiler' --filter='!@vertz/site' --filter='!@vertz/og' --filter='!@vertz/mint-docs' --filter='!@vertz-benchmarks/*' --filter='!contacts-api-example' --filter='!create-vertz' --filter='!landing'

      - name: Run tests with coverage
        env:
          DATABASE_TEST_URL: postgres://postgres:postgres@localhost:5432/vertz_test
        run: |
          run_coverage() {
            local pkg=$1
            echo "::group::Coverage — $pkg"
            cd packages/$pkg

            # Detect test runner from package.json "test" script
            TEST_SCRIPT=$(node -e "console.log(require('./package.json').scripts?.test ?? '')")

            if echo "$TEST_SCRIPT" | grep -q "bun test"; then
              bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage || true
            else
              bunx vitest run \
                --coverage \
                --coverage.reporter=json-summary \
                --coverage.reporter=json \
                --coverage.reporter=text \
                --coverage.reportOnFailure || true
            fi

            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          }

          # On push to main or workflow_dispatch, run coverage for all packages
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-compiler ui-primitives ui-server; do
              run_coverage "$pkg"
            done
            exit 0
          fi

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA)

          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-compiler ui-primitives ui-server; do
            if echo "$CHANGED_FILES" | grep -q "^packages/$pkg/"; then
              run_coverage "$pkg"
            else
              echo "Skipping coverage for $pkg (no changes)"
            fi
          done

      - name: Verify coverage output
        run: |
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-compiler ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "OK: packages/$pkg/coverage/lcov.info (bun test)"
            elif [ -f "packages/$pkg/coverage/coverage-summary.json" ]; then
              echo "OK: packages/$pkg/coverage/coverage-summary.json (vitest)"
            else
              echo "MISSING: packages/$pkg — no coverage output found"
            fi
          done

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Download and verify the Codecov CLI
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov

          # Create commit and report in Codecov
          ./codecov create-commit -t "$CODECOV_TOKEN" --git-service github
          ./codecov create-report -t "$CODECOV_TOKEN" --git-service github

          # Upload each package's coverage with its own flag
          # bun test produces lcov.info (relative paths), vitest produces coverage-final.json (absolute paths)
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-compiler ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "Uploading coverage for $pkg (lcov)"
              # bun test emits relative SF: paths (e.g. "src/foo.ts").
              # Codecov flags match against repo-root-relative paths (e.g. "packages/pkg/src/foo.ts").
              # Rewrite SF: lines to include the package prefix so flag matching works.
              sed -i "s|^SF:src/|SF:packages/$pkg/src/|" "packages/$pkg/coverage/lcov.info"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/lcov.info" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            elif [ -f "packages/$pkg/coverage/coverage-final.json" ]; then
              echo "Uploading coverage for $pkg (json)"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/coverage-final.json" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            else
              echo "Skipping $pkg (no coverage file)"
            fi
          done

          # Signal that all uploads are complete — triggers report processing
          ./codecov send-notifications -t "$CODECOV_TOKEN" --git-service github
