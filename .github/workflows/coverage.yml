name: Coverage

on:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vertz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          shared-key: vtz-ci-release

      - name: Build vtz from source (release profile)
        run: |
          cd native
          cargo build -p vtz --release
          cd ..
          mkdir -p packages/runtime-linux-x64
          cp native/target/release/vtz packages/runtime-linux-x64/vtz
          chmod +x packages/runtime-linux-x64/vtz
          bash scripts/link-runtime.sh
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          vtz install --frozen
          bash scripts/link-runtime.sh

      - name: Verify vtz binary is built from source
        run: |
          vtz --version
          file $(readlink -f node_modules/.bin/vtz)

      - name: Build @vertz/build
        run: |
          cd packages/build && tsc --outDir dist --declaration
          cd $GITHUB_WORKSPACE
          ln -sf ../../packages/build/dist/cli.js node_modules/.bin/vertz-build
          chmod +x node_modules/.bin/vertz-build

      - name: Build @vertz/ci
        run: cd packages/ci && vtz run build

      - name: Build packages
        run: vtz ci build-typecheck --concurrency 2

      - name: Run tests with coverage
        env:
          DATABASE_TEST_URL: postgres://postgres:postgres@localhost:5432/vertz_test
        run: |
          FAILED_PKGS=()

          run_coverage() {
            local pkg=$1
            echo "::group::Coverage — $pkg"
            cd packages/$pkg

            # Detect test runner from package.json "test" script
            TEST_SCRIPT=$(node -e "console.log(require('./package.json').scripts?.test ?? '')")

            if echo "$TEST_SCRIPT" | grep -q "vtz test"; then
              if ! vtz test --coverage; then
                FAILED_PKGS+=("$pkg")
              fi
            else
              if ! vitest run \
                --coverage \
                --coverage.reporter=json-summary \
                --coverage.reporter=json \
                --coverage.reporter=text \
                --coverage.reportOnFailure; then
                FAILED_PKGS+=("$pkg")
              fi
            fi

            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          }

          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            run_coverage "$pkg"
          done

          if [ ${#FAILED_PKGS[@]} -gt 0 ]; then
            echo "::error::Tests failed in ${#FAILED_PKGS[@]} package(s): ${FAILED_PKGS[*]}"
            exit 1
          fi

      - name: Verify coverage output
        run: |
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "OK: packages/$pkg/coverage/lcov.info (vtz test)"
            elif [ -f "packages/$pkg/coverage/coverage-summary.json" ]; then
              echo "OK: packages/$pkg/coverage/coverage-summary.json (vitest)"
            else
              echo "MISSING: packages/$pkg — no coverage output found"
            fi
          done

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Download and verify the Codecov CLI
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov

          # Create commit and report in Codecov
          ./codecov create-commit -t "$CODECOV_TOKEN" --git-service github
          ./codecov create-report -t "$CODECOV_TOKEN" --git-service github

          # Upload each package's coverage with its own flag
          # vtz test produces lcov.info (relative paths), vitest produces coverage-final.json (absolute paths)
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "Uploading coverage for $pkg (lcov)"
              # vtz test emits relative SF: paths (e.g. "src/foo.ts").
              # Codecov flags match against repo-root-relative paths (e.g. "packages/pkg/src/foo.ts").
              # Rewrite SF: lines to include the package prefix so flag matching works.
              sed -i "s|^SF:src/|SF:packages/$pkg/src/|" "packages/$pkg/coverage/lcov.info"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/lcov.info" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            elif [ -f "packages/$pkg/coverage/coverage-final.json" ]; then
              echo "Uploading coverage for $pkg (json)"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/coverage-final.json" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            else
              echo "Skipping $pkg (no coverage file)"
            fi
          done

          # Signal that all uploads are complete — triggers report processing
          ./codecov send-notifications -t "$CODECOV_TOKEN" --git-service github
