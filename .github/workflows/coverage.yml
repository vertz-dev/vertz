name: Coverage

on:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vertz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve vtz version
        id: resolve-vtz
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          if npm view "@vertz/runtime-linux-x64@${VERSION}" version &>/dev/null; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(npm view @vertz/runtime-linux-x64 dist-tags.latest 2>/dev/null)
            echo "::warning::vtz ${VERSION} not yet published on npm, using ${LATEST}"
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup vtz
        uses: vertz-dev/setup-vtz@v1
        with:
          version: ${{ steps.resolve-vtz.outputs.version }}

      # TODO: Switch to `vtz install --frozen` once the next vtz release
      # ships with the scoped-bin-stub fix (native/vtz/src/pm/bin.rs).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          # Remove fallback vtz shell script so the native binary from setup-vtz is used
          rm -f node_modules/.bin/vtz node_modules/.bin/vertz

      - name: Build @vertz/build
        run: cd packages/build && tsc --outDir dist --declaration

      - name: Build @vertz/ci
        run: cd packages/ci && vtz run build

      - name: Build packages
        run: |
          set +eo pipefail
          timeout --kill-after=10 120 vtz ci build-typecheck --concurrency 2 2>&1 | tee /tmp/build-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -eo pipefail

          if [ $EXIT_CODE -eq 0 ]; then exit 0; fi

          if [ $EXIT_CODE -eq 124 ] || [ $EXIT_CODE -eq 137 ]; then
            if grep -q '\[pipe\] Done in' /tmp/build-output.log && grep -q '0 failed' /tmp/build-output.log; then
              echo "::warning::vtz ci completed but process did not exit cleanly"
              exit 0
            fi
          fi

          echo "::error::Build failed with exit code $EXIT_CODE"
          exit 1

      - name: Run tests with coverage
        env:
          DATABASE_TEST_URL: postgres://postgres:postgres@localhost:5432/vertz_test
        run: |
          run_coverage() {
            local pkg=$1
            echo "::group::Coverage — $pkg"
            cd packages/$pkg

            # Detect test runner from package.json "test" script
            TEST_SCRIPT=$(node -e "console.log(require('./package.json').scripts?.test ?? '')")

            if echo "$TEST_SCRIPT" | grep -q "vtz test"; then
              timeout --kill-after=10 120 vtz test --coverage || true
            else
              timeout --kill-after=10 120 vitest run \
                --coverage \
                --coverage.reporter=json-summary \
                --coverage.reporter=json \
                --coverage.reporter=text \
                --coverage.reportOnFailure || true
            fi

            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          }

          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            run_coverage "$pkg"
          done

      - name: Verify coverage output
        run: |
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "OK: packages/$pkg/coverage/lcov.info (vtz test)"
            elif [ -f "packages/$pkg/coverage/coverage-summary.json" ]; then
              echo "OK: packages/$pkg/coverage/coverage-summary.json (vitest)"
            else
              echo "MISSING: packages/$pkg — no coverage output found"
            fi
          done

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Download and verify the Codecov CLI
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov

          # Create commit and report in Codecov
          ./codecov create-commit -t "$CODECOV_TOKEN" --git-service github
          ./codecov create-report -t "$CODECOV_TOKEN" --git-service github

          # Upload each package's coverage with its own flag
          # vtz test produces lcov.info (relative paths), vitest produces coverage-final.json (absolute paths)
          for pkg in core schema compiler codegen cli cli-runtime fetch testing db cloudflare errors server tui ui ui-canvas ui-primitives ui-server; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              echo "Uploading coverage for $pkg (lcov)"
              # vtz test emits relative SF: paths (e.g. "src/foo.ts").
              # Codecov flags match against repo-root-relative paths (e.g. "packages/pkg/src/foo.ts").
              # Rewrite SF: lines to include the package prefix so flag matching works.
              sed -i "s|^SF:src/|SF:packages/$pkg/src/|" "packages/$pkg/coverage/lcov.info"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/lcov.info" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            elif [ -f "packages/$pkg/coverage/coverage-final.json" ]; then
              echo "Uploading coverage for $pkg (json)"
              ./codecov do-upload \
                -t "$CODECOV_TOKEN" \
                --git-service github \
                --file "packages/$pkg/coverage/coverage-final.json" \
                --flag "$pkg" \
                --disable-search \
                --network-root-folder "$GITHUB_WORKSPACE"
            else
              echo "Skipping $pkg (no coverage file)"
            fi
          done

          # Signal that all uploads are complete — triggers report processing
          ./codecov send-notifications -t "$CODECOV_TOKEN" --git-service github
