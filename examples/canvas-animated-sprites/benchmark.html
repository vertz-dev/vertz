<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertz Canvas - Performance Benchmark</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: white;
    }
    
    h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }
    
    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    button:hover {
      background: #357abd;
    }
    
    button.active {
      background: #28a745;
    }
    
    .canvas-container {
      position: relative;
      display: inline-block;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .stats {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.85);
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.8;
    }
    
    .stats .metric {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    
    .stats .label {
      color: #aaa;
    }
    
    .stats .value {
      color: #0f0;
      font-weight: bold;
    }
    
    .stats .value.warning {
      color: #ff0;
    }
    
    .stats .value.error {
      color: #f00;
    }
    
    #root {
      /* Placeholder for vertz-rendered content */
    }
  </style>
</head>
<body>
  <h1>🚀 Vertz Canvas - Performance Benchmark</h1>
  
  <div class="controls">
    <button id="btn-100" class="active">100 Sprites</button>
    <button id="btn-500">500 Sprites</button>
    <button id="btn-1000">1000 Sprites</button>
    <button id="btn-2000">2000 Sprites</button>
  </div>
  
  <div id="root"></div>
  
  <script type="module" src="./benchmark.ts"></script>
</body>
</html>
