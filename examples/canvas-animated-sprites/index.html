<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertz Canvas — Animated Sprites (Spike 01)</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: system-ui, sans-serif; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .info { font-size: 13px; color: #888; margin-bottom: 16px; }
    .controls { display: flex; gap: 8px; margin-bottom: 16px; }
    button {
      background: #4a90e2; color: #fff; border: none; padding: 8px 16px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #357abd; }
    button.active { background: #28a745; }
    .wrap { position: relative; display: inline-block; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
    #stats {
      position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.75);
      padding: 10px 14px; border-radius: 4px; font: 13px/1.8 monospace; color: #0f0;
      white-space: pre;
    }
  </style>
</head>
<body>
  <h1>🎨 Vertz Canvas — Animated Sprites (Spike 01)</h1>
  <p class="info">Bouncing sprites driven by vertz signals, rendered via PixiJS. Click to change count.</p>
  <div class="controls">
    <button data-count="100" class="active">100</button>
    <button data-count="500">500</button>
    <button data-count="1000">1 000</button>
    <button data-count="2000">2 000</button>
  </div>
  <div class="wrap">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="stats">Loading…</div>
  </div>
  <script type="module" src="./app.ts"></script>
</body>
</html>
