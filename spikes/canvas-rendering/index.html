<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Rendering Spike - Vertz + PixiJS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
    }
    #app {
      display: flex;
      height: 100vh;
    }
    .panel {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .panel-header {
      margin-bottom: 15px;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
    }
    .panel-header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    .panel-header .stats {
      font-size: 14px;
      color: #888;
      font-family: monospace;
    }
    .panel-content {
      flex: 1;
      position: relative;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
    }
    .controls {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 15px 20px;
      display: flex;
      gap: 15px;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .controls input[type="range"] {
      width: 150px;
    }
    .controls button {
      padding: 8px 16px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .controls button:hover {
      background: #0052cc;
    }
    #dom-container, #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .node {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 6px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      user-select: none;
      transition: transform 0.1s ease;
    }
    .node:active {
      cursor: grabbing;
      transform: scale(1.05);
    }
    .fps-counter {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 5px 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <div class="panel-header">
        <h2>DOM Rendering</h2>
        <div class="stats">
          <span class="fps-counter" id="dom-fps">-- FPS</span>
        </div>
      </div>
      <div class="panel-content">
        <div id="dom-container"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Canvas Rendering (PixiJS)</h2>
        <div class="stats">
          <span class="fps-counter" id="canvas-fps">-- FPS</span>
        </div>
      </div>
      <div class="panel-content">
        <div id="canvas-container"></div>
      </div>
    </div>
  </div>
  
  <div class="controls">
    <label>
      Node Count:
      <input type="range" id="node-count" min="10" max="1000" value="100" step="10">
      <span id="node-count-value">100</span>
    </label>
    <button id="randomize">Randomize Positions</button>
    <button id="animate">Toggle Animation</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
