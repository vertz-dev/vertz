pre-push:
  commands:
    trojan-source:
      run: bash scripts/check-unicode.sh
    quality-gates:
      run: turbo run lint typecheck test build --filter='!@vertz-examples/*' --filter='!entity-todo-example' --filter='!@vertz/landing-nextjs' --filter='!@vertz/landing-nextjs-vercel' --filter='!@vertz/native-compiler' --filter='!@vertz/landing' --filter='!@vertz/component-docs' --output-logs=errors-only
    native-compiler:
      root: native/
      glob: "native/**/*.rs"
      run: cargo fmt --all -- --check && cargo clippy --all-targets --release -- -D warnings && cargo test --all
