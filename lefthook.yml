pre-push:
  commands:
    trojan-source:
      run: bash scripts/check-unicode.sh
    lint:
      run: node_modules/.bin/vtzx oxlint packages/ && node_modules/.bin/vtzx oxfmt --check packages/
    quality-gates:
      run: turbo run build typecheck test --filter=!@vertz-examples/* --filter=!entity-todo-example --filter=!@vertz/landing-nextjs --filter=!@vertz/landing-nextjs-vercel --filter=!@vertz/landing --filter=!@vertz/component-docs --filter=!@vertz/site --filter=!@vertz/og --filter=!@vertz/mint-docs --filter=!@vertz-benchmarks/* --filter=!contacts-api-example --filter=!create-vertz --filter=!@vertz/create-vertz-app --filter=!landing --filter=!@vertz/ui-primitives --filter=!@vertz/ui-server --filter=!@vertz/dev-orchestrator --filter=!@vertz/test --filter=!@vertz/icons --filter=!@vertz/compiler --filter=!@vertz/desktop --filter=!@vertz/fetch --filter=!@vertz/openapi --filter=!@vertz/core --filter=!@vertz/codegen --filter=!@vertz/db --filter=!@vertz/ui-canvas --filter=!@vertz/ui --filter=!@vertz/ui-auth --filter=!@vertz/theme-shadcn --filter=!@vertz/docs --filter=!@vertz/integration-tests --filter=!@vertz/agents --filter=!@vertz/testing --filter=!@vertz/cloudflare --filter=!@vertz/mdx --filter=!@vertz/native-compiler --filter=!@vertz/tui --filter=!hmr-e2e-fixture --filter=!vertz --filter=!@vertz/runtime --filter=!@vertz/runtime-darwin-arm64 --filter=!@vertz/runtime-darwin-x64 --filter=!@vertz/runtime-linux-arm64 --filter=!@vertz/runtime-linux-x64 --filter=!@vertz/server --filter=!@vertz/schema --filter=!@vertz/errors --filter=!@vertz/ci --filter=!@vertz/cli --filter=!@vertz/cli-runtime --filter=!@vertz/build --output-logs=errors-only
    rust-fmt:
      run: cd native && cargo fmt --all -- --check
      glob: "native/**/*.rs"
    rust-clippy:
      run: cd native && cargo clippy --all-targets --release -- -D warnings
      glob: "native/**/*.rs"
    rust-test:
      run: cd native && cargo test --all
      glob: "native/**/*.rs"
