name = "vertz-component-docs"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
workers_dev = true

[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"

[[routes]]
pattern = "components.vertz.dev"
custom_domain = true
