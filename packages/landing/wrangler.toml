name = "vertz-landing"
compatibility_date = "2025-01-01"
workers_dev = true

[assets]
directory = "./dist/client"
# serve_directly = false so the Worker's fetch handler receives ALL requests,
# including the /__presence WebSocket upgrade. Without this, the assets handler
# intercepts /__presence and serves index.html.
serve_directly = false
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"

[[durable_objects.bindings]]
name = "PRESENCE_ROOM"
class_name = "PresenceRoom"

[[migrations]]
tag = "v1"
new_classes = ["PresenceRoom"]

[[routes]]
pattern = "vertz.dev"
custom_domain = true
